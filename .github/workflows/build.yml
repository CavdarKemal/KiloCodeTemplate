name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          
      - name: Build with Maven (Java 25)
        run: mvn clean compile -DskipTests -Djava.version=25
        
      - name: Run Tests (Java 25)
        run: mvn test -Djava.version=25
        
      - name: Build JAR (Java 25)
        run: mvn package -DskipTests -Djava.version=25
        
      - name: Build Docker Image
        run: |
          docker build -t kilocode-app:${{ github.sha }} .
          
      - name: Test Docker Image
        run: |
          docker-compose up -d
          sleep 30
          docker-compose down
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jar-file
          path: target/*.jar