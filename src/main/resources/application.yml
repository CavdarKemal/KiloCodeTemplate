spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/verein_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  mvc:
    cors:
      enabled: true

server:
  port: 8080

jwt:
  secret: verein-verwaltung-sicherer-geheimer-schluessel-fuer-jwt-token-generierung-2026
  expiration: 86400000

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE